# ============================================================================
# docker-compose.yml — entorno local de desarrollo de Grupo Bravo
# ----------------------------------------------------------------------------
# Levanta dos servicios:
#   - backend: API FastAPI en localhost:8000 (con --reload, montando ./backend
#              como volumen para hot-reload al guardar código).
#   - mongo:   MongoDB 7 con persistencia en el volumen `mongo_data`.
#              Bind a 127.0.0.1 para que NO esté expuesto en la red local.
#
# Cómo arrancar:
#     docker compose up        # foreground (logs en consola)
#     docker compose up -d     # background
#     docker compose down      # para todo
#     docker compose down -v   # para todo + BORRA el volumen (datos)
#
# Healthchecks:
#   El backend solo arranca cuando mongo está "healthy" (depends_on).
#   El healthcheck de mongo hace `db.adminCommand("ping")` cada 30s.
#
# NOTA SEGURIDAD:
#   - Las credenciales de mongo se leen de variables de entorno (MONGO_INITDB_*).
#     Defínelas en el .env raíz, NUNCA en este fichero versionado.
#   - El puerto 27017 se enlaza a 127.0.0.1 para que MongoDB no quede expuesto
#     fuera del host. Cámbialo sólo cuando lo necesites de forma explícita.
# ============================================================================
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Si usas MongoDB Atlas, define MONGO_URI en el .env y comenta el servicio mongo de abajo.
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  mongo:
    image: mongo:7
    # Bind a 127.0.0.1 para que la BD no quede expuesta a la red local.
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?Define MONGO_INITDB_ROOT_USERNAME en el .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?Define MONGO_INITDB_ROOT_PASSWORD en el .env}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

volumes:
  mongo_data:
