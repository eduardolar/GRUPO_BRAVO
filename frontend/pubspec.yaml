name: frontend
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Dependencia del lector QR
  mobile_scanner: ^3.5.0
  google_fonts: ^6.1.0
  provider: ^6.1.5+1
  http: ^1.2.1
  intl: ^0.20.2
  flutter_stripe: ^10.2.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.0
  qr_flutter: ^4.1.0

  cached_network_image: ^3.4.0

  # Dependencia para el GPS
  geolocator: ^13.0.0  # La librería para el GPS
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  flutter_typeahead: ^6.0.0

  # Audio (alerta de pedido nuevo en cocina)
  audioplayers: ^6.1.0

  # Notificaciones locales (cliente: aviso de "pedido listo")
  flutter_local_notifications: ^17.2.3

  # Web APIs (window.print, history.replaceState…). Solo se importa desde
  # implementaciones condicionales `*_web.dart`; en móvil se usa el stub.
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
